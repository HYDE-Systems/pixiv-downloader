name: 機能要望
description: 新機能・改善の提案
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        提案ありがとうございます。「何を解決したいか」を中心に記入してください。

  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題
      description: 現状どこが不便か、どんな場面で困るか。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 提案する機能
      description: どう動いてほしいか。UI や API のイメージがあれば具体的に。
    validations:
      required: true

  - type: dropdown
    id: components
    attributes:
      label: 関連コンポーネント
      multiple: true
      options:
        - ダッシュボード (フロントエンド)
        - バックエンド API
        - ダウンロード / SMB 保存
        - 認証 / ログイン
        - RSS フィード
        - Chrome 拡張機能
        - Docker / Compose / CI
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 代替案・回避策
      description: 検討した他の方法があれば。

  - type: checkboxes
    id: checks
    attributes:
      label: 確認事項
      options:
        - label: 既存の Issue に重複がないか検索した
          required: true
