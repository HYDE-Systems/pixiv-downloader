<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <style>
    :root {
      --ink:#14110F; --panel:#1e1a17; --line:#38302a; --paper:#ede6d8;
      --dim:#9a9183; --vermilion:#e34234; --jade:#6e8b7b;
    }
    * { box-sizing: border-box; }
    body {
      width: 320px; margin: 0; background: var(--ink); color: var(--paper);
      font-family: "Hiragino Sans","Noto Sans JP",system-ui,sans-serif; font-size: 13px;
    }
    header { padding: 14px 16px; border-bottom: 1px solid var(--line); display:flex; align-items:center; gap:10px; }
    .stamp { width:24px;height:24px;border-radius:5px;background:var(--vermilion);color:var(--ink);
      display:grid;place-items:center;font-weight:700;transform:rotate(-6deg);font-family:"Space Mono",monospace; }
    header b { font-size: 14px; letter-spacing:-0.01em; }
    header small { display:block; color:var(--dim); font-size:10px; letter-spacing:0.18em; text-transform:uppercase; font-family:"Space Mono",monospace; }
    .body { padding: 14px 16px; }
    .count { font-family:"Space Mono",monospace; }
    .count .big { font-size: 34px; font-weight: 700; line-height:1; color: var(--vermilion); }
    .count .lbl { color: var(--dim); font-size: 11px; letter-spacing:0.16em; text-transform:uppercase; margin-top:4px; }
    .list { max-height: 168px; overflow:auto; margin: 12px 0; border:1px solid var(--line); border-radius:3px; }
    .row { padding: 8px 11px; border-bottom: 1px solid var(--line); font-size:12px; display:flex; gap:8px; align-items:center; }
    .row:last-child { border-bottom:0; }
    .row .k { font-family:"Space Mono",monospace; font-size:9px; padding:2px 6px; border-radius:10px; border:1px solid var(--line); color:var(--dim); flex:none; }
    .row .k.u { color: var(--jade); border-color:rgba(110,139,123,.4); }
    .row .t { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .empty { padding: 20px; text-align:center; color: var(--dim); font-size:12px; }
    button { width:100%; font-family:"Space Mono",monospace; font-size:12px; letter-spacing:0.06em; text-transform:uppercase;
      padding: 11px; border-radius:3px; border:1px solid var(--vermilion); background:var(--vermilion); color:var(--ink);
      font-weight:700; cursor:pointer; }
    button:hover { background:#b5301f; color:var(--paper); }
    button:disabled { opacity:.4; cursor:not-allowed; }
    button.ghost { background:transparent; color:var(--paper); border-color:var(--line); font-weight:400; margin-top:8px; }
    .msg { margin-top:10px; font-size:12px; min-height:16px; }
    .msg.ok { color: var(--jade); } .msg.err { color: var(--vermilion); }
    a.cfg { color:var(--dim); font-size:11px; text-decoration:none; display:inline-block; margin-top:12px; }
    a.cfg:hover { color: var(--vermilion); }
  </style>
</head>
<body>
  <header>
    <span class="stamp">朱</span>
    <div><b>Download Studio</b><small>batch to queue</small></div>
  </header>
  <div class="body">
    <div class="count"><div class="big" id="count">0</div><div class="lbl">対応タブを検出</div></div>
    <div class="list" id="list"></div>
    <button id="send" disabled>一括でキューに送る</button>
    <button class="ghost" id="refresh">再スキャン</button>
    <div class="msg" id="msg"></div>
    <a class="cfg" id="opts" href="#">⚙ ダッシュボードURL / トークンを設定</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
